<nav class="sidebar-nudo">
  <div class="sidebar-header">
    <div class="logo-wrapper">
      <span class="logo-emoji">🪢</span>
      <span class="logo-nombre">NUDO</span>
    </div>
  </div>

  <div class="sidebar-content">
    <ul class="menu-lista">
      
      @for (item of menuItems; track item.route) {
        <li class="menu-item">
          <a [routerLink]="item.route" 
             routerLinkActive="activo-item" 
             class="menu-link"
             [class.destacado-mente]="item.label === 'La mente detrás'">
            <span class="menu-label">{{ item.label }}</span>
          </a>
        </li>
      }

    </ul>
  </div>

  <div class="sidebar-footer">
    <div class="footer-acciones">
      
      <button class="btn-footer btn-salir" (click)="cerrarSesion()">
        <span class="footer-icon">🚪</span>
        <span class="footer-text">Salir</span>
      </button>

    </div>
  </div>
</nav>
