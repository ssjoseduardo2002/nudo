<nav class="navbar-horizontal">
  
  <div class="nav-seccion-izquierda">
    <img src="/images/NUDO.jpg" alt="Logotipo NUDO" class="logo-horizontal">
  </div>

  <div class="nav-seccion-centro">
    <ul class="nav-links">
      <li *ngFor="let item of menuItems">
        <a [routerLink]="item.route" routerLinkActive="activo-link">
          {{ item.label }}
        </a>
      </li>
      
      <li>
        <a routerLink="/vistas/perfil-creador" class="mente-nudo">
          La mente detrás de NUDO
        </a>
      </li>
    </ul>
  </div>

  <div class="nav-seccion-derecha">
    
    <div class="usuario-pill" [title]="usuarioLogueado.rol">
      <span class="nombre-user">{{ usuarioLogueado.nombre }}</span>
      <div class="avatar-mini">{{ usuarioLogueado.iniciales }}</div>
    </div>

    <button class="btn-config" 
            (click)="abrirConfiguracion()" 
            title="Configuración">
      ⚙️
    </button>
    
    <button class="btn-salir-icon" 
            (click)="cerrarSesion()" 
            title="Cerrar Sesión">
      🚪
    </button>
  </div>

</nav>
