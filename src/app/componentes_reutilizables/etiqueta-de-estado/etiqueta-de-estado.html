<div class="contenedor-etiqueta" role="status" [attr.aria-label]="'Estado del documento: ' + estado">
  <span class="badge-nudo" [ngClass]="'estado-' + estado.toLowerCase().replace(' ', '-')">
    
    <span class="icono-estado" aria-hidden="true">
      <ng-container [ngSwitch]="estado.toLowerCase()">
        <span *ngSwitchCase="'firmado'">✅</span>
        <span *ngSwitchCase="'pendiente'">⏳</span>
        <span *ngSwitchCase="'blockchain'">⛓️</span>
        <span *ngSwitchCase="'rechazado'">❌</span>
        <span *ngSwitchDefault>📄</span>
      </ng-container>
    </span>

    <span class="texto-estado">{{ estado | titlecase }}</span>
    
    <span class="pulso" *ngIf="estado.toLowerCase() === 'blockchain'"></span>
  </span>
</div>
