<article class="contenedor-tarjeta-nudo shadow-premium animate-fade-in" aria-labelledby="titulo-{{ contrato.folio }}">
  
  <header class="header-tarjeta">
    <div class="icono-tipo-doc" aria-hidden="true">
      <span class="emoji-doc">📄</span>
    </div>
    <div class="meta-contrato">
      <h3 id="titulo-{{ contrato.folio }}" class="titulo-contrato">{{ contrato.titulo }}</h3>
      <small class="folio-contrato" aria-label="Folio del contrato">ID: {{ contrato.folio }}</small>
    </div>
    <app-etiqueta-de-estado [estado]="contrato.estado"></app-etiqueta-de-estado>
  </header>

  <main class="cuerpo-tarjeta">
    <div class="detalle">
      <span class="label">Cliente / Negocio:</span>
      <p class="valor">{{ contrato.cliente }}</p>
    </div>
    <div class="fila-doble">
      <div class="detalle">
        <span class="label">Fecha:</span>
        <p class="valor">{{ contrato.fecha | date:'dd/MM/yyyy' }}</p>
      </div>
      <div class="detalle text-right">
        <span class="label">Monto:</span>
        <p class="valor monto">${{ contrato.monto | number:'1.2-2' }}</p>
      </div>
    </div>
  </main>

  <footer class="footer-tarjeta">
    <div class="hash-blockchain" *ngIf="contrato.estado === 'Blockchain'" [title]="'Hash completo: ' + contrato.hashBlockchain">
      <span class="key-icon" aria-hidden="true">🔑</span>
      <span class="hash-text">{{ contrato.hashBlockchain | slice:0:12 }}...</span>
    </div>
    
    <div class="acciones-btn" role="group" aria-label="Acciones del contrato">
      <button class="btn-icon" aria-label="Ver detalles" (click)="verDetalles()">👁️</button>
      <button class="btn-icon" aria-label="Descargar contrato PDF" (click)="descargarPdf()">📥</button>
      <button class="btn-primario-nudo" (click)="gestionarContrato()">Gestionar</button>
    </div>
  </footer>

</article>
