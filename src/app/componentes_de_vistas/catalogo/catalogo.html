<div class="contenedor-catalogo">
  <header class="encabezado-seccion">
    <div class="titulos">
      <h2>📂 Mis NUDOS</h2>
      <p>Gestiona, descarga y protege tus acuerdos legales.</p>
    </div>
    <button class="btn-nuevo" [routerLink]="['/generador-contrato']">
      <span>+</span> Crear Nuevo
    </button>
  </header>

  <div class="grid-contratos">
    <div class="tarjeta-contrato" *ngFor="let contrato of misContratos">
      <div class="header-card">
        <span class="badge" [class.pendiente]="contrato.estado === 'Pendiente'">
          {{ contrato.estado }}
        </span>
        <span class="menu-opciones">...</span>
      </div>
      
      <div class="cuerpo-card">
        <h3>{{ contrato.nombre }}</h3>
        <p class="meta">Generado el: {{ contrato.fecha }}</p>
      </div>

      <div class="footer-card">
        <button class="btn-accion secundario">Ver PDF</button>
        <button class="btn-accion primario">Gestionar</button>
      </div>
    </div>

    <div class="tarjeta-vacia" [routerLink]="['/generador-contrato']">
      <div class="circulo-plus">+</div>
      <p>Crear un nuevo blindaje legal</p>
    </div>
  </div>
</div>
