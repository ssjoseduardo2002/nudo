<div class="contenedor-perfil">
  <header class="header-perfil">
    <h2>👤 Mi Perfil Profesional</h2>
    <p>Gestiona tu información para que tus contratos siempre tengan los datos correctos.</p>
  </header>

  <div class="tarjeta-perfil">
    <div class="avatar-seccion">
      <div class="circulo-avatar">{{ usuario.nombre[0] }}</div>
      <button class="btn-foto">Cambiar Foto</button>
    </div>

    <form class="formulario-perfil" (ngSubmit)="guardarCambios()">
      <div class="fila">
        <div class="campo">
          <label>Nombre</label>
          <input type="text" [(ngModel)]="usuario.nombre" name="nombre" class="input-nudo">
        </div>
        <div class="campo">
          <label>Apellido</label>
          <input type="text" [(ngModel)]="usuario.apellido" name="apellido" class="input-nudo">
        </div>
      </div>

      <div class="campo">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="usuario.email" name="email" class="input-nudo">
      </div>

      <div class="campo">
        <label>Especialidad / Profesión</label>
        <input type="text" [(ngModel)]="usuario.profesion" name="profesion" class="input-nudo">
      </div>

      <div class="campo">
        <label>Biografía corta</label>
        <textarea [(ngModel)]="usuario.biografia" name="biografia" class="input-nudo" rows="3"></textarea>
      </div>

      <div class="acciones-perfil">
        <button type="submit" class="btn-guardar">Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>
