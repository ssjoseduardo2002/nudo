<div class="contenedor-inicio-pro">
  
  <section class="banner-inicio">
    <div class="texto-bienvenida">
      <h1>¡Qué gusto verte, {{nombreUsuario}}!</h1>
      <p>Hoy es un gran día para asegurar nuevos proyectos en <strong>NUDO</strong>.</p>
    </div>
  </section>

  <div class="tablero-resumen">
    <div class="tarjeta-stat">
      <span class="cifra">12</span>
      <p>Contratos Activos</p>
    </div>
    
    <div class="tarjeta-stat">
      <span class="cifra">05</span>
      <p>Pendientes de Firma</p>
    </div>

    <div class="tarjeta-stat especial">
      <span class="pin-emoji">📌</span>
      <p>Recuerda revisar el contrato de <strong>"Agencia Creativa"</strong>.</p>
    </div>
  </div>

  <section class="accesos-rapidos">
    <h2>¿Qué quieres hacer ahora?</h2>
    
    <div class="grid-opciones">
      <a [routerLink]="['/generador-contrato']" class="opcion-card">
        <i class="icono">⚡</i>
        <span>Nuevo Contrato</span>
      </a>

      <a [routerLink]="['/catalogo']" class="opcion-card">
        <i class="icono">📂</i>
        <span>Mis Documentos</span>
      </a>

      <a [routerLink]="['/perfil-usuario']" class="opcion-card">
        <i class="icono">⚙️</i>
        <span>Configuración</span>
      </a>
    </div>
  </section>

</div>
