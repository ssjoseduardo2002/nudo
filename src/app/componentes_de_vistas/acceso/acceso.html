<div class="pantalla-login">
  <div class="tarjeta-acceso">
    
    <div class="lado-visual">
      <img src="images/bloque_de_color2.png" alt="Seguridad NUDO" class="ilustracion">
      <div class="texto-soporte">
        <h2>Protege tu talento.</h2>
        <p>Seguridad legal inmediata para tus proyectos.</p>
      </div>
    </div>

    <div class="lado-formulario">
      
      <div class="cabecera-interna">
        <h1>Ingresar</h1>
        <p>Introduce tus datos para acceder.</p>
      </div>

      <form class="formulario-nudo" (submit)="onLogin(); $event.preventDefault()">
        
        <div class="grupo-input">
          <label>Correo Electrónico</label>
          <input 
            type="email" 
            name="correo"
            [(ngModel)]="correo" 
            placeholder="tu@correo.com">
        </div>

        <div class="grupo-input">
          <label>Contraseña</label>
          <input 
            type="password" 
            name="contrasena"
            [(ngModel)]="contrasena" 
            placeholder="••••••••">
        </div>

        <button type="submit" class="btn-ingresar">Iniciar Sesión</button>
      </form>

      <footer class="pie-registro">
        <p>¿Aún no eres parte? <span class="link">Regístrate gratis</span></p>
      </footer>

    </div>
  </div>
</div>
