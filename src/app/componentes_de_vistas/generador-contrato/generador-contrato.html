<div class="contenedor-vista-cuadro">
  <div class="tarjeta-generador">
    
    <div class="stepper-progreso">
      <div class="paso activo"><span>1</span> Datos Básicos</div>
      <div class="linea"></div>
      <div class="paso"><span>2</span> Cláusulas</div>
      <div class="linea"></div>
      <div class="paso"><span>3</span> Revisión</div>
    </div>

    <div class="contenido-generador">
      <div class="seccion-formulario">
        <header>
          <h2>Configura tu contrato</h2>
          <p>Paso 1: Información de las partes involucradas.</p>
        </header>

        <form class="formulario-paso">
          <div class="grupo-input">
            <label>Nombre del Cliente / Empresa</label>
            <input type="text" placeholder="Ej. Agencia Creativa S.A.">
          </div>
          
          <div class="grupo-input">
            <label>Monto del Proyecto (MXN)</label>
            <input type="number" placeholder="$0.00">
          </div>

          <div class="grupo-input">
            <label>Fecha de Entrega Final</label>
            <input type="date">
          </div>

          <div class="acciones-pasos">
            <button type="button" class="btn-atras">Cancelar</button>
            <button type="button" class="btn-siguiente">Siguiente paso</button>
          </div>
        </form>
      </div>

      <div class="seccion-visual">
        <img src="images/risografia2.png" alt="Diseño NUDO" class="img-apoyo">
        <div class="tip-ayuda">
          <img src="images/pin.png" alt="Tip" class="pin-icon">
          <p><strong>Tip del CEO:</strong> Asegúrate de que los nombres coincidan exactamente con las identificaciones oficiales.</p>
        </div>
      </div>
    </div>

  </div>
</div>
