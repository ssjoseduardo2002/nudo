<div class="contenedor-vista-cuadro">
  <div class="tarjeta-pago">
    
    <div class="resumen-pedido">
      <div class="imagen-producto">
        <img src="images/bloque_de_color.png" alt="Suscripción NUDO">
      </div>
      <div class="detalles-compra">
        <h3>Plan Profesional NUDO</h3>
        <p>Contratos ilimitados y asesoría legal básica.</p>
        <div class="divisor-pago"></div>
        <div class="total-pago">
          <span>Total a pagar:</span>
          <span class="monto">$199.00 MXN</span>
        </div>
      </div>
    </div>

    <div class="formulario-pago">
      <header>
        <h2>Método de Pago</h2>
        <p>Transacción segura y encriptada.</p>
      </header>

      <form class="nudo-pago-form">
        <div class="grupo-input-pago">
          <label>Nombre en la Tarjeta</label>
          <input type="text" placeholder="Como aparece en el plástico">
        </div>

        <div class="grupo-input-pago">
          <label>Número de Tarjeta</label>
          <input type="text" placeholder="0000 0000 0000 0000">
        </div>

        <div class="fila-pago">
          <div class="grupo-input-pago">
            <label>Expiración</label>
            <input type="text" placeholder="MM / AA">
          </div>
          <div class="grupo-input-pago">
            <label>CVC</label>
            <input type="text" placeholder="123">
          </div>
        </div>

        <button type="submit" class="btn-finalizar-pago">Pagar Ahora</button>
      </form>
    </div>

  </div>
</div>
